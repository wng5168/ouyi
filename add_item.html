<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>新产品录入</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; margin: 0; padding: 20px; color: #333; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { margin-top: 0; color: #2196F3; font-size: 1.2rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input[readonly] { background: #eee; color: #666; }
        .btn-submit { width: 100%; background: #2196F3; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-submit:active { background: #1976D2; }
    </style>
</head>
<body>
    <div class="card">
        <h2>📝 新产品建档</h2>
        <div class="form-group">
            <label>产品条码 (自动提取)</label>
            <input type="text" id="barcode" readonly>
        </div>
        <div class="form-group">
            <label>产品名称</label>
            <input type="text" id="name" placeholder="请输入名称">
        </div>
        <div class="form-group">
            <label>单价 (€)</label>
            <input type="number" id="price" step="0.01" placeholder="0.00">
        </div>
        <div class="form-group">
            <label>初始库位</label>
            <input type="text" id="loc" placeholder="例如 A01-05">
        </div>
        <button class="btn-submit" onclick="submitForm()">确认录入</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // 自动从 URL 获取条码参数 (?code=12345)
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code') || "";
        document.getElementById('barcode').value = code;

        function submitForm() {
            const name = document.getElementById('name').value.trim();
            const price = document.getElementById('price').value.trim();
            const loc = document.getElementById('loc').value.trim();

            if (!name || !price) {
                alert("请填写完整的名称和价格");
                return;
            }

            // 打包数据，使用特定前缀 ADD_ITEM
            const payload = `ADD_ITEM|${code}|${name}|${price}|${loc}`;
            tg.sendData(payload); // 发送给机器人后端
            tg.close();
        }
    </script>
</body>
</html>
