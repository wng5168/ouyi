<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>极速专业扫码</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; margin: 0; text-align: center; }
        #reader { width: 100%; height: 100vh; }
        #info { position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 10; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div id="info">正在启动高清扫描引擎...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // 全屏展示

        const html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 20, 
            qrbox: { width: 280, height: 200 }, // 矩形框更适合条形码
            aspectRatio: 1.0 
        };

        // 启动摄像头
        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // 识别成功
                document.getElementById("info").innerText = "识别成功: " + decodedText;
                html5QrCode.stop().then(() => {
                    tg.sendData(decodedText); // 发送数据回机器人
                    tg.close(); // 自动关闭
                });
            },
            (errorMessage) => { /* 忽略扫描过程中的噪音 */ }
        ).catch((err) => {
            document.getElementById("info").innerText = "摄像头启动失败，请检查权限";
        });
    </script>
</body>
</html>
