<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>极速专业扫码</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; margin: 0; text-align: center; overflow: hidden; }
        #reader { width: 100%; height: 100vh; }
        #info { position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 10; font-size: 14px; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div id="info">正在初始化高清扫描引擎...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // 自动展开 WebApp 至全屏

        const html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 20, 
            qrbox: { width: 280, height: 200 }, // 矩形框比例，更有利于捕捉长条形码
            aspectRatio: 1.0 
        };

        // 扫码成功的回调逻辑
        const onScanSuccess = (decodedText) => {
            document.getElementById("info").innerText = "识别成功: " + decodedText;
            // 识别后立即停止摄像头，释放资源
            html5QrCode.stop().then(() => {
                tg.sendData(decodedText); // 将结果回传给 Telegram 机器人
                tg.close(); // 自动关闭扫码页面
            }).catch(err => {
                tg.sendData(decodedText);
                tg.close();
            });
        };

        // 启动扫描器的函数
        async function startScanner() {
            try {
                // 尝试触发浏览器对摄像头权限的记忆
                if (navigator.permissions && navigator.permissions.query) {
                    const status = await navigator.permissions.query({ name: 'camera' });
                    console.log("当前摄像头权限状态:", status.state);
                }

                await html5QrCode.start(
                    { facingMode: "environment" }, // 强制调用后置摄像头
                    config,
                    onScanSuccess,
                    (errorMessage) => { /* 扫描过程中的常规噪音，不予处理 */ }
                );
                document.getElementById("info").innerText = "请对准产品条码或库位码";
            } catch (err) {
                console.error("启动失败:", err);
                document.getElementById("info").innerText = "摄像头启动失败，请在设置中允许访问相机";
            }
        }

        // 执行启动
        startScanner();
    </script>
</body>
</html>
