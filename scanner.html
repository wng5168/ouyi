<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>极速扫码</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="text-align: center; padding-top: 50px; font-family: sans-serif;">
    <p>正在拉起相机...</p>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        // 核心：调用 Telegram 原生扫码弹出框
        tg.showScanQrPopup({
            text: "请将条码放入框内"
        }, function(text) {
            // 扫码成功后，通过 sendData 把条码发回给机器人
            tg.sendData(text); 
            return true; // 扫码成功后自动关闭弹出框
        });
    </script>
</body>
</html>
