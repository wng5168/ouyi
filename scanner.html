<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>极速专业扫码</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; margin: 0; text-align: center; overflow: hidden; }
        #reader { width: 100%; height: 100vh; }
        #info { position: fixed; bottom: 20px; width: 100%; text-align: center; z-index: 10; font-size: 14px; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <div id="info">正在启动高清扫描引擎...</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand(); // 自动展开 WebApp 至全屏

        const html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 20, 
            qrbox: { width: 280, height: 200 }, // 矩形框更适合长条形码
            aspectRatio: 1.0 
        };

        // --- 核心优化逻辑：权限预检与启动封装 ---
        async function initScanner() {
            try {
                // 1. 尝试触发浏览器对权限状态的静默查询
                // 这一步能让某些 Webview 内核意识到该域名已在系统层授权
                if (navigator.permissions && navigator.permissions.query) {
                    try {
                        const result = await navigator.permissions.query({ name: 'camera' });
                        console.log("当前相机权限状态: " + result.state);
                    } catch (pErr) {
                        console.log("权限查询暂不支持");
                    }
                }

                // 2. 启动摄像头
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config,
                    (decodedText) => {
                        // 识别成功处理
                        document.getElementById("info").innerText = "识别成功: " + decodedText;
                        html5QrCode.stop().then(() => {
                            tg.sendData(decodedText); // 发送数据回机器人
                            tg.close(); // 自动关闭
                        }).catch(() => {
                            tg.sendData(decodedText);
                            tg.close();
                        });
                    },
                    (errorMessage) => { /* 过滤扫描过程中的解析噪音 */ }
                );
                
                document.getElementById("info").innerText = "请对准产品条码或库位码";
            } catch (err) {
                console.error("摄像头启动失败: ", err);
                document.getElementById("info").innerText = "摄像头启动失败，请确保已授予权限并使用 HTTPS 访问";
            }
        }

        // 页面加载后立即执行
        initScanner();
    </script>
</body>
</html>
