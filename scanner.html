<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>极速连续扫码作业</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: white; margin: 0; text-align: center; overflow: hidden; font-family: sans-serif; }
        #reader { width: 100%; height: 100vh; }
        
        /* 底部悬浮操控台 UI */
        .control-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(20, 20, 20, 0.95); padding: 25px 0 35px 0; z-index: 10; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -4px 10px rgba(0,0,0,0.5); }
        #info { font-size: 18px; font-weight: bold; margin-bottom: 20px; color: #fff; line-height: 1.5; }
        .highlight { color: #FFD700; font-size: 20px; } /* 高亮产品码 */
        
        /* 取消按钮样式 */
        .btn-cancel { background: #444; color: white; border: 1px solid #666; padding: 12px 35px; font-size: 16px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-cancel:active { background: #666; }
    </style>
</head>
<body>
    <div id="reader"></div>
    
    <div class="control-panel">
        <div id="info">第一步：请扫描 <span style="color:#00e676;">【产品条码】</span></div>
        <button class="btn-cancel" onclick="tg.close()">❌ 取消并返回</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 20, qrbox: { width: 280, height: 200 }, aspectRatio: 1.0 };
        
        // --- 核心：状态机变量 ---
        let currentStep = 1; 
        let scannedProduct = "";

        const onScanSuccess = (decodedText) => {
            if (currentStep === 1) {
                // 【完成第一步】记录产品码，准备扫库位码
                scannedProduct = decodedText;
                currentStep = 2;
                
                // 更新 UI 提示
                document.getElementById("info").innerHTML = `已锁定产品: <span class="highlight">${scannedProduct}</span><br>第二步：请扫描 <span style="color:#2196F3;">【新库位码】</span>`;
                
                // ⚠️ 关键技巧：暂停扫描器 1.5 秒，防止用户还没移开手，就把刚才的码当成库位码又扫了一遍
                html5QrCode.pause();
                setTimeout(() => { html5QrCode.resume(); }, 1500);

            } else if (currentStep === 2) {
                // 【完成第二步】拿到库位码
                let locationCode = decodedText;
                document.getElementById("info").innerText = "数据处理中，请稍候...";
                
                // 将两个码打包成一条专有指令，例如： MOVE_LOC|产品码|库位码
                let payload = `MOVE_LOC|${scannedProduct}|${locationCode}`;
                
                // 停止摄像头并发送回 Telegram（发送后 Web App 会自动关闭）
                html5QrCode.stop().then(() => {
                    tg.sendData(payload);
                    tg.close();
                }).catch(() => {
                    tg.sendData(payload);
                    tg.close();
                });
            }
        };

        async function startScanner() {
            try {
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess, () => {});
            } catch (err) {
                document.getElementById("info").innerText = "摄像头启动失败，请检查系统权限";
            }
        }

        startScanner();
    </script>
</body>
</html>
